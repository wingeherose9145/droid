<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* 主容器：强制全屏 */
        #main-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; /* 垂直排列，为了导航按钮 */
            justify-content: center; align-items: center;
        }

        /* 全屏视频容器，用于 Java 代码处理和自适应 */
        #video-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            z-index: 5; /* 确保在其他自定义 UI 下方 */
        }

        /* 视频自动最大化适配，且保持比例 */
        video {
            width: 100%; height: 100%;
            object-fit: contain; /* 关键：自动横竖屏适配不拉伸 */
            background: #000;
        }

        /* 顶部状态提示 */
        #info {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 14px; z-index: 10; pointer-events: none;
            transition: opacity 0.3s;
        }

        /* 导航按钮容器 - 放在屏幕中间偏下 */
        #nav-controls {
            position: absolute; bottom: 100px; /* 位于控制条上方 */
            left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px;
            z-index: 20; /* 确保位于视频上方 */
        }

        /* 重新设计的导航按钮 */
        .nav-btn {
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 30px; 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: 0.3s;
            cursor: pointer;
        }
        .nav-btn:active { background: rgba(255,255,255,0.3); }

        /* 全屏按钮容器 */
        #fullscreen-btn-container {
            position: absolute; bottom: 30px; left: 30px;
            z-index: 30; /* 确保位于最上方 */
        }

        /* 重新设计全屏按钮 */
        #fullscreen-btn {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 24px; 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            transition: 0.3s;
            cursor: pointer;
        }
        #fullscreen-btn:active { background: rgba(255,255,255,0.3); }

        /* 右下角添加按钮容器 */
        #add-btn-container {
            position: absolute; bottom: 30px; right: 30px;
            z-index: 30; /* 确保位于最上方 */
        }

        /* 重新设计添加按钮 */
        #add-btn {
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
            cursor: pointer;
        }
        #add-btn::before { content: '+'; color: #fff; font-size: 30px; }
        #add-btn:active { background: rgba(255,255,255,0.3); }

    </style>
</head>
<body>
    <div id="main-container">
        <div id="info">暂无视频，请添加</div>
        
        <div id="video-container">
            <video id="player" controls playsinline></video>
        </div>

        <div id="nav-controls">
            <div id="prev" class="nav-btn" onclick="playPrev()">‹</div>
            <div id="next" class="nav-btn" onclick="playNext()">›</div>
        </div>
        
        <div id="fullscreen-btn-container">
            <div id="fullscreen-btn" onclick="toggleFullscreen()">F</div> </div>

        <div id="add-btn-container">
            <div id="add-btn" onclick="triggerAdd()"></div>
        </div>
    </div>

    <script>
        let playlist = [];
        let currentIndex = -1;
        const player = document.getElementById('player');
        const info = document.getElementById('info');
        const videoContainer = document.getElementById('video-container');

        function triggerAdd() {
            if (window.AndroidInterface) {
                window.AndroidInterface.openFilePicker();
            }
        }

        // Java 调用的回调函数
        function addVideoToList(url) {
            playlist.push(url);
            if (currentIndex === -1) {
                playIndex(0);
            } else {
                updateInfo();
            }
        }

        function playIndex(index) {
            if (index >= 0 && index < playlist.length) {
                currentIndex = index;
                player.src = playlist[currentIndex];
                player.play();
                updateInfo();
            }
        }

        function playNext() {
            if (playlist.length === 0) return;
            let next = (currentIndex + 1) % playlist.length;
            playIndex(next);
        }

        function playPrev() {
            if (playlist.length === 0) return;
            let prev = (currentIndex - 1 + playlist.length) % playlist.length;
            playIndex(prev);
        }

        function updateInfo() {
            info.innerText = `视频: ${currentIndex + 1} / ${playlist.length}`;
            // 自动隐藏提示
            info.style.opacity = "1";
            setTimeout(() => { info.style.opacity = "0"; }, 3000);
        }

        // 视频播放结束自动下一个
        player.onended = () => { playNext(); };

        // 全屏切换逻辑
        function toggleFullscreen() {
            // 首先尝试调用 Android 原生全屏处理
            if (window.AndroidInterface && window.AndroidInterface.toggleFullscreen) {
                window.AndroidInterface.toggleFullscreen();
            } else {
                // 回退到 JS 全屏模式
                if (!document.fullscreenElement) {
                    if (videoContainer.requestFullscreen) {
                        videoContainer.requestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            }
        }

        // 监听全屏状态变化，隐藏/显示自定义 UI
        document.addEventListener('fullscreenchange', (event) => {
            if (document.fullscreenElement) {
                // 全屏时隐藏自定义 UI，避免干扰
                document.getElementById('nav-controls').style.display = 'none';
                document.getElementById('fullscreen-btn-container').style.display = 'none';
                document.getElementById('add-btn-container').style.display = 'none';
                document.getElementById('info').style.display = 'none';
            } else {
                // 退出全屏时显示自定义 UI
                document.getElementById('nav-controls').style.display = 'flex';
                document.getElementById('fullscreen-btn-container').style.display = 'block';
                document.getElementById('add-btn-container').style.display = 'block';
                document.getElementById('info').style.display = 'block';
            }
        });

    </script>
</body>
</html>
