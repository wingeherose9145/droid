<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        /* 强制全屏容器 */
        #main-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* 视频自动最大化适配，且保持比例 */
        video {
            width: 100%; height: 100%;
            object-fit: contain; /* 关键：自动横竖屏适配不拉伸 */
            background: #000;
        }

        /* 顶部状态提示 */
        #info {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 14px; z-index: 10; pointer-events: none;
        }

        /* 左右导航按钮 */
        .nav-btn {
            position: absolute; top: 0; height: 100%; width: 15%;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.2); font-size: 40px; z-index: 20;
            background: transparent; transition: 0.3s;
        }
        .nav-btn:active { background: rgba(255,255,255,0.1); color: #fff; }
        #prev { left: 0; }
        #next { right: 0; }

        /* 右下角添加按钮 */
        #add-btn {
            position: absolute; bottom: 30px; right: 30px; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            z-index: 30;
        }
        #add-btn::before { content: '+'; color: #fff; font-size: 30px; }
    </style>
</head>
<body>
    <div id="main-container">
        <div id="info">暂无视频，请添加</div>
        
        <video id="player" controls playsinline></video>

        <div id="prev" class="nav-btn" onclick="playPrev()">‹</div>
        <div id="next" class="nav-btn" onclick="playNext()">›</div>
        
        <div id="add-btn" onclick="triggerAdd()"></div>
    </div>

    <script>
        let playlist = [];
        let currentIndex = -1;
        const player = document.getElementById('player');
        const info = document.getElementById('info');

        function triggerAdd() {
            if (window.AndroidInterface) {
                window.AndroidInterface.openFilePicker();
            }
        }

        // Java 调用的回调函数
        function addVideoToList(url) {
            playlist.push(url);
            if (currentIndex === -1) {
                playIndex(0);
            } else {
                updateInfo();
            }
        }

        function playIndex(index) {
            if (index >= 0 && index < playlist.length) {
                currentIndex = index;
                player.src = playlist[currentIndex];
                player.play();
                updateInfo();
            }
        }

        function playNext() {
            if (playlist.length === 0) return;
            let next = (currentIndex + 1) % playlist.length;
            playIndex(next);
        }

        function playPrev() {
            if (playlist.length === 0) return;
            let prev = (currentIndex - 1 + playlist.length) % playlist.length;
            playIndex(prev);
        }

        function updateInfo() {
            info.innerText = `视频: ${currentIndex + 1} / ${playlist.length}`;
            // 自动隐藏提示
            setTimeout(() => { info.style.opacity = "0"; }, 3000);
            info.style.opacity = "1";
        }

        // 视频播放结束自动下一个
        player.onended = () => { playNext(); };
    </script>
</body>
</html>
